<form class="splunk-formatter-section" section-label="General">
    <div class="control-group">
        <span class="control-label" style="display: block; padding-top: 5px; width: 160px; float: left; text-align: right;">Node Placement Mode</span>
        <div class="controls">
            <div class="btn-group shared-controls-controlgroup-control" id="aws_dfd_display_mode" data-name="display_mode">
                <button class="btn" data-value="auto">Auto (Physics)</button>
                <button class="btn" data-value="manual">Manual (Sticky)</button>
            </div>
            <span class="help-block">Manual mode locks icons where you drop them.</span>
        </div>
    </div>

    <splunk-control-group label="Layout Engine" help="Choose between Zero-Trust static, force-directed, or hierarchical tree layouts.">
        <splunk-radio-input name="{{VIZ_NAMESPACE}}.layoutMode" value="zero-trust">
            <option value="zero-trust">Zero-Trust Static</option>
            <option value="force">Force Directed</option>
            <option value="hierarchy">Hierarchy (Tree)</option>
        </splunk-radio-input>
    </splunk-control-group>

    <splunk-control-group label="Tree Direction" help="Only applies when Layout Engine is set to Hierarchy.">
        <splunk-radio-input name="{{VIZ_NAMESPACE}}.hierarchyDirection" value="Top to Bottom">
            <option value="Top to Bottom">Top to Bottom</option>
            <option value="Left to Right">Left to Right</option>
        </splunk-radio-input>
    </splunk-control-group>

    <splunk-control-group label="Draggable Nodes" help=" ">
        <splunk-radio-input name="{{VIZ_NAMESPACE}}.draggableNodes" value="true">
            <option value="true">True</option>
            <option value="false">False</option>
        </splunk-radio-input>
    </splunk-control-group>

    <splunk-control-group label="Enable Zoom" help=" ">
        <splunk-radio-input name="{{VIZ_NAMESPACE}}.canZoom" value="true">
            <option value="true">True</option>
            <option value="false">False</option>
        </splunk-radio-input>
    </splunk-control-group>

    <splunk-control-group label="Node Text Size" help=" ">
        <splunk-select name="{{VIZ_NAMESPACE}}.nodeTextSize" value="medium">
            <option value="small">Small</option>
            <option value="medium">Medium</option>
            <option value="large">Large</option>
            <option value="extraLarge">Extra Large</option>
        </splunk-select>
    </splunk-control-group>

    <splunk-control-group label="Wrap Node Text" help=" ">
        <splunk-radio-input name="{{VIZ_NAMESPACE}}.wrapNodeText" value="true">
            <option value="true">True</option>
            <option value="false">False</option>
        </splunk-radio-input>
    </splunk-control-group>

    <splunk-control-group label="Dashboard Layout" help="Specialized panel alignments for dense or expanded dashboards.">
        <splunk-select name="{{VIZ_NAMESPACE}}.designLayoutDashboard" value="default">
            <option value="compact">Compact (Dense)</option>
            <option value="default">Default</option>
            <option value="expanded">Expanded (Wide)</option>
        </splunk-select>
    </splunk-control-group>

    <splunk-control-group label="Cloud Service Provider (CSP)" help="Select the icon & naming stencil set, or auto-detect based on node schema.">
        <splunk-select name="{{VIZ_NAMESPACE}}.cspStencilSet" value="auto">
            <option value="auto">Auto Detect (Dynamic)</option>
            <option value="aws">AWS (Amazon Web Services)</option>
            <option value="azure">Microsoft Azure</option>
            <option value="gcp">Google Cloud Platform (GCP)</option>
        </splunk-select>
    </splunk-control-group>

    <splunk-control-group label="Clustering" help=" ">
        <splunk-radio-input name="{{VIZ_NAMESPACE}}.clusterBy" value="none">
            <option value="none">None</option>
            <option value="color">Color</option>
            <option value="group">Group</option>
        </splunk-radio-input>
    </splunk-control-group>

    <splunk-control-group label="Default Node Type" help=" ">
        <splunk-select name="{{VIZ_NAMESPACE}}.defaultNodeType" value="circle">
            <option value="circle">circle</option>
            <option value="square">square</option>
            <option value="diamond">diamond</option>
            <option value="triangle">triangle</option>
            <option value="hexagon">hexagon</option>
            <option value="star">star</option>
        </splunk-select> 
    </splunk-control-group>

    <splunk-control-group label="Missing Image URL" help=" ">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.missingImageURL" value="/static/app/AWS-DFD-Visualizer/icons/generic.svg"></splunk-text-input>
    </splunk-control-group>

   	 <splunk-control-group label="Drilldown using" help=" ">
		<splunk-radio-input name="{{VIZ_NAMESPACE}}.drilldownClick" value="singleOrDouble">
			<option value="singleOrDouble">Double Click Only</option>
			<option value="single">Single Click</option>
		</splunk-radio-input>
	</splunk-control-group>

    <splunk-control-group label="Custom Status Palette" help="Map custom status values to hex colors. Format: Status1=#RRGGBB,Status2=#RRGGBB (e.g. NonCompliant=#FF6B6B,EXEMPT=#4ECB71). Augments built-in defaults.">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.statusPalette"></splunk-text-input>
    </splunk-control-group>

</form>

<form class="splunk-formatter-section" section-label="Physics">
	 <splunk-control-group label="Enable Physics" help="Toggle D3 force simulation.">
		<splunk-radio-input name="{{VIZ_NAMESPACE}}.enablePhysics" value="true">
			<option value="true">True</option>
			<option value="false">False</option>
		</splunk-radio-input>
	</splunk-control-group>

	 <splunk-control-group label="Hide Edges on Drag" help="Improves performance when dragging nodes.">
		<splunk-radio-input name="{{VIZ_NAMESPACE}}.hideEdgesOnDrag" value="false">
			<option value="true">True</option>
			<option value="false">False</option>
		</splunk-radio-input>
	</splunk-control-group>

	<splunk-control-group label="Physics Model" help="Forces applied to nodes in Auto mode.">
		<splunk-select name="{{VIZ_NAMESPACE}}.physicsModel" value="classic">
			<option value="classic">Classic Force-Directed</option>
			<option value="cluster">Group Clustering</option>
			<option value="horizontal-stack">Horizontal Depth Stack</option>
		</splunk-select>
	</splunk-control-group>

	<splunk-control-group label="Directional Jitter / Pull" help="Gently shake or pull nodes towards a specific edge of the panel to stabilize isolated elements.">
		<splunk-select name="{{VIZ_NAMESPACE}}.shakeTowards" value="none">
			<option value="none">None</option>
			<option value="center">Center</option>
			<option value="top">Top</option>
			<option value="bottom">Bottom</option>
			<option value="left">Left</option>
			<option value="right">Right</option>
		</splunk-select>
	</splunk-control-group>
</form>

<form class="splunk-formatter-section" section-label="Links">
	 <splunk-control-group label="Smooth Edges" help="Draw curved connections instead of straight lines.">
		<splunk-radio-input name="{{VIZ_NAMESPACE}}.smoothEdges" value="true">
			<option value="true">True</option>
			<option value="false">False</option>
		</splunk-radio-input>
	</splunk-control-group>

	 <splunk-control-group label="Link Text Size" help="Size of the relationship text.">
		<splunk-select name="{{VIZ_NAMESPACE}}.linkTextSize" value="medium">
			<option value="small">Small</option>
			<option value="medium">Medium</option>
			<option value="large">Large</option>
			<option value="extraLarge">Extra Large</option>
		</splunk-select>
	</splunk-control-group>
</form>

<form class="splunk-formatter-section" section-label="Governance Terminology">
    <splunk-control-group label="Terminology Preset" help="Select a governance preset or Custom to specify manually.">
        <splunk-select name="{{VIZ_NAMESPACE}}.governancePreset" value="standard">
            <option value="standard">Standard Architecture</option>
            <option value="zta">Zero Trust (NIST) (PAP, PDP, PEP)</option>
            <option value="business">Business Service (Client, Tx, DB)</option>
            <option value="custom">Custom (Use text fields below)</option>
        </splunk-select>
    </splunk-control-group>
    <splunk-control-group label="Identity Plane Title" help="Custom label for the Identity Plane (top swimlane). Only active when Custom is selected.">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.labelIdentityPlane" value="Identity/Management Plane"></splunk-text-input>
    </splunk-control-group>
    <splunk-control-group label="Control Plane Title" help="Custom label for the Policy & Control Plane (middle swimlane). Only active when Custom is selected.">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.labelControlPlane" value="⚙️ Control Plane"></splunk-text-input>
    </splunk-control-group>
    <splunk-control-group label="Data Plane Title" help="Custom label for the Infrastructure / Data Plane (bottom swimlane). Only active when Custom is selected.">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.labelDataPlane" value="Data Plane"></splunk-text-input>
    </splunk-control-group>
</form>

<form class="splunk-formatter-section" section-label="Licensing">
    <splunk-control-group label="License Key" help="Paste your Enterprise or Sovereign GovTier license key (Base64 encoded). Press Tab or click outside the field to save. Changes take effect on next search run.">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.licenseKey"></splunk-text-input>
    </splunk-control-group>
</form>
