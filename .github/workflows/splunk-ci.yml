name: Splunk App CI/CD (IL5 Hardened)

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # STAGE 1: Security Scanning & Local Validation (Fast Feedback)
  security_and_validation:
    name: Security Scan & Local AppInspect
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node.js 22 LTS
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Secret Scanning (TruffleHog)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          # Removed base/head for initial push to enable full-repo scan
          extra_args: --only-verified

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Python Security Scan (Bandit)
        run: |
          pip install bandit
          # Ignore exit code for initial pass to allow report upload
          bandit -r . -x ./tests -ll || true

      - name: Splunk AppInspect (Local CLI)
        uses: splunk/appinspect-cli-action@v2
        with:
          app_path: .
          result_file: appinspect-report.html

      - name: Upload Security Reports
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: security-reports
          path: |
            appinspect-report.html

  # STAGE 2: Build, SBOM & Optional Cloud Validation
  build_and_package:
    name: Build & Package (IL5 SBOM)
    needs: security_and_validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node.js 22 LTS
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Package Splunk App
        run: |
          mkdir dist
          # Clean out WSL-specific noise and hidden files before packaging
          find . -name "*Zone.Identifier*" -type f -delete
          find . -name ".DS_Store" -type f -delete
          tar -czvf dist/AWS-DFD-Visualizer.spl \
            --exclude='.git*' \
            --exclude='.github*' \
            --exclude='dist' \
            .

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          path: dist/
          format: cyclonedx-json
          output-file: dist/bom.json

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v5
        with:
          name: aws-dfd-visualizer-il5-package
          path: dist/

  # STAGE 3: Splunk Cloud API Validation (Release Gating)
  # This job only runs on main/master merges when secrets are available
  cloud_validation:
    name: Splunk Cloud API Validation
    needs: build_and_package
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node.js 22 LTS
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Download Package
        uses: actions/download-artifact@v5
        with:
          name: aws-dfd-visualizer-il5-package
          path: dist/

      # Placeholder: This requires SPLUNKBASE_USERNAME and SPLUNKBASE_PASSWORD secrets
      # - name: Splunk AppInspect (Cloud API)
      #   uses: splunk/appinspect-api-action@v1
      #   with:
      #     app_path: dist/AWS-DFD-Visualizer.spl
      #     splunkbase_username: ${{ secrets.SPLUNKBASE_USERNAME }}
      #     splunkbase_password: ${{ secrets.SPLUNKBASE_PASSWORD }}
