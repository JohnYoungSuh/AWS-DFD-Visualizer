name: Splunk App CI/CD (IL5 Hardened)

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  APP_NAME: AWS-DFD-Visualizer
  VERSION: "2.6.0"

jobs:
  # STAGE 1: Build, Security Scanning & AppInspect Validation
  security_and_validation:
    name: Security Scan & Local AppInspect
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node.js 22 LTS
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'

      # TruffleHog filesystem scan — avoids git commit-resolution errors
      # that occur when base/head SHAs are not resolvable (e.g. initial push)
      - name: Secret Scanning (TruffleHog)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified --no-git
        continue-on-error: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Python Security Scan (Bandit)
        run: |
          pip install bandit
          # Ignore exit code for initial pass to allow report upload
          bandit -r . -x ./tests -ll || true

      # Build the webpack bundle and package the .spl BEFORE AppInspect.
      # AppInspect requires a valid gzip-compressed Splunk app archive (.spl).
      # Passing app_path: . (repo root) causes it to inspect the Makefile and fail.
      - name: Install Dependencies
        run: npm install

      - name: Build webpack bundle
        run: npm run build

      - name: Package Splunk App (.spl)
        run: |
          SPL_FILE="${APP_NAME}-${VERSION}.spl"
          mkdir -p dist/${APP_NAME}
          # Copy only standard Splunk app folders — no node_modules, src, or dev tooling
          cp -r appserver default metadata splunk-app-manifest.json dist/${APP_NAME}/ 2>/dev/null || true
          # Remove WSL artifacts and hidden files from staging area
          find dist/${APP_NAME} -name ".*" -type f -delete
          find dist/${APP_NAME} -name "*Zone.Identifier*" -type f -delete
          # Set AppInspect-required permissions: 755 dirs, 644 files
          find dist/${APP_NAME} -type d -exec chmod 755 {} +
          find dist/${APP_NAME} -type f -exec chmod 644 {} +
          chmod -R 755 dist/${APP_NAME}/bin 2>/dev/null || true
          # Create the tarball
          tar -czf ${SPL_FILE} -C dist ${APP_NAME}
          echo "SPL_FILE=${SPL_FILE}" >> $GITHUB_ENV
          echo "Packaged: ${SPL_FILE}"

      - name: Splunk AppInspect (Local CLI)
        uses: splunk/appinspect-cli-action@v2
        with:
          app_path: ${{ env.SPL_FILE }}
          result_file: appinspect-report.html

      - name: Upload Security Reports
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: security-reports
          path: |
            appinspect-report.html

      # Upload the validated .spl for Stage 2 to reuse (avoids double-build)
      - name: Upload Validated .spl
        uses: actions/upload-artifact@v5
        with:
          name: validated-spl
          path: ${{ env.SPL_FILE }}

  # STAGE 2: SBOM Generation (reuses the .spl validated in Stage 1)
  build_and_package:
    name: Build & Package (IL5 SBOM)
    needs: security_and_validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Download Validated .spl
        uses: actions/download-artifact@v5
        with:
          name: validated-spl
          path: dist/

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          path: dist/
          format: cyclonedx-json
          output-file: dist/bom.json

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v5
        with:
          name: aws-dfd-visualizer-il5-package
          path: dist/

  # STAGE 3: Splunk Cloud API Validation (Release Gating)
  # This job only runs on main/master merges when secrets are available
  cloud_validation:
    name: Splunk Cloud API Validation
    needs: build_and_package
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node.js 22 LTS
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Download Package
        uses: actions/download-artifact@v5
        with:
          name: aws-dfd-visualizer-il5-package
          path: dist/

      # Placeholder: This requires SPLUNKBASE_USERNAME and SPLUNKBASE_PASSWORD secrets
      # - name: Splunk AppInspect (Cloud API)
      #   uses: splunk/appinspect-api-action@v1
      #   with:
      #     app_path: dist/AWS-DFD-Visualizer.spl
      #     splunkbase_username: ${{ secrets.SPLUNKBASE_USERNAME }}
      #     splunkbase_password: ${{ secrets.SPLUNKBASE_PASSWORD }}
