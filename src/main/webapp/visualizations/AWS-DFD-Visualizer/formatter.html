<form class="splunk-formatter-section" id="aws_dfd_formatter">
    <div class="control-group">
        <label class="control-label" for="aws_dfd_display_mode">Diagram Layout Mode</label>
        <div class="controls">
            <div class="btn-group shared-controls-controlgroup-control" id="aws_dfd_display_mode" data-name="display_mode">
                <button class="btn" data-value="auto">Auto (Physics)</button>
                <button class="btn" data-value="manual">Manual (Sticky)</button>
            </div>
            <span class="help-block">Manual mode locks icons where you drop them.</span>
        </div>
    </div>

    <splunk-control-group label="Cloud Service Provider (CSP)" help="Select the icon & naming stencil set, or auto-detect based on node schema.">
        <splunk-select name="{{VIZ_NAMESPACE}}.cspStencilSet" value="auto">
            <option value="auto">Auto Detect (Dynamic)</option>
            <option value="aws">AWS (Amazon Web Services)</option>
            <option value="azure">Microsoft Azure</option>
            <option value="gcp">Google Cloud Platform (GCP)</option>
        </splunk-select>
    </splunk-control-group>
</form>
